# Manifest file for remote pre-commit hook discovery
# Defines hook entries for users importing this repository from GitHub.

- id: universal-validation
  name: Universal Code Validation
  entry: universal-validation
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit]

- id: conventional-commits
  name: Conventional Commit Validation
  entry: universal-validation
  language: python
  pass_filenames: false
  stages: [commit-msg]
