# Universal Pre-Commit Validation Configuration

# Enable or disable core stages of the validation pipeline
stages:
  formatter: true
  lint: true
  build: true
  tests: true
  security: false

# Configuration for language-specific security and audit tools
security:
  enabled: false
  
  # Python security tools
  bandit: true                # Run Bandit for Python security linting
  pip_audit: true             # Run pip-audit for Python dependency checking
  
  # React/JS security tools
  npm_audit: true             # Run npm audit for JavaScript/TypeScript vulnerabilities
  
  # Java security tools
  owasp_dependency_check: false # Run OWASP Dependency Check (requires Maven/Gradle plugin configuration)

# Git Auto-Commit & Auto-Push Settings
git:
  auto_push: true              # Enable auto-push to git remote on successful validation
  auto_commit: true            # Automatically stage and commit code changes before pushing
  remote: "origin"             # Git remote repository name
  target_branch: ""            # Target branch to push to (empty defaults to currently checked out branch)
  commit_prefix: "chore: pre-commit validation passed"

# Auto-Fix & Lint Warning Settings
auto_fix: true                 # Automatically repair code formatting and linting errors when possible
allow_lint_warnings: true      # Allow non-fatal linter warnings after auto-fix without blocking push




